# =============================================================================
# 📅 PLANNING-TICKET-RESTAU - DEPLOY TO GHCR
# =============================================================================
# Build et push des images sur GHCR
# Watchtower sur le NAS détecte et redéploie automatiquement
# =============================================================================

name: 🚀 Deploy to GHCR

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy-ghcr.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/theo-stoffelbach/planning-tickets

jobs:
  # ===========================================================================
  # DETECT CHANGES
  # ===========================================================================
  detect-changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.changes.outputs.backend }}
      frontend_changed: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/deploy-ghcr.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/deploy-ghcr.yml'

  # ===========================================================================
  # TEST BACKEND (si modifié)
  # ===========================================================================
  test-backend:
    name: 🧪 Backend Audit
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.backend_changed == 'true' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: 📦 Install dependencies
        working-directory: ./backend
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: 🔒 Security audit
        working-directory: ./backend
        run: composer audit

  # ===========================================================================
  # TEST FRONTEND (si modifié)
  # ===========================================================================
  test-frontend:
    name: 🧪 Frontend Audit
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.frontend_changed == 'true' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: 🔒 Security audit
        working-directory: ./frontend
        run: npm audit --audit-level=moderate

  # ===========================================================================
  # BUILD BACKEND (si modifié)
  # ===========================================================================
  build-backend:
    name: 🔧 Backend (Laravel)
    runs-on: ubuntu-latest
    needs: [detect-changes, test-backend]
    if: success() && ${{ needs.detect-changes.outputs.backend_changed == 'true' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: docker/setup-buildx-action@v3
      
      - name: 🏗️ Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:latest
            ${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
          cache-from: type=gha,scope=planning-backend
          cache-to: type=gha,mode=max,scope=planning-backend
      
      - name: ✅ Backend Summary
        run: echo "🎉 Backend poussé sur GHCR !"

  # ===========================================================================
  # BUILD FRONTEND (si modifié)
  # ===========================================================================
  build-frontend:
    name: 🎨 Frontend (React)
    runs-on: ubuntu-latest
    needs: [detect-changes, test-frontend]
    if: success() && ${{ needs.detect-changes.outputs.frontend_changed == 'true' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: docker/setup-buildx-action@v3
      
      - name: 🏗️ Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          cache-from: type=gha,scope=planning-frontend
          cache-to: type=gha,mode=max,scope=planning-frontend
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
      
      - name: ✅ Frontend Summary
        run: echo "🎉 Frontend poussé sur GHCR !"

  # ===========================================================================
  # NOTIFICATION
  # ===========================================================================
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: [detect-changes, build-backend, build-frontend]
    if: always()
    steps:
      - name: ✅ Summary
        run: |
          echo "🎉 Déploiement terminé !"
          echo ""
          echo "Changements détectés :"
          echo "  - Backend modifié : ${{ needs.detect-changes.outputs.backend_changed }}"
          echo "  - Frontend modifié : ${{ needs.detect-changes.outputs.frontend_changed }}"
          echo ""
          echo "Images sur GHCR :"
          if [ "${{ needs.detect-changes.outputs.backend_changed }}" == "true" ]; then
            echo "  - ghcr.io/theo-stoffelbach/planning-tickets-backend:latest"
          fi
          if [ "${{ needs.detect-changes.outputs.frontend_changed }}" == "true" ]; then
            echo "  - ghcr.io/theo-stoffelbach/planning-tickets-frontend:latest"
          fi
          echo ""
          echo "⏰ Watchtower va détecter et redémarrer automatiquement."
